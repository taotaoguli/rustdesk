name: TaotaoDesk
on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
      - run: |
          cd flutter
          flutter pub get
          flutter build windows --release
      - run: ren flutter\build\windows\runner\Release\rustdesk.exe taotaodesk.exe
      - run: |
          $cert = New-SelfSignedCertificate -Type CodeSigning -Subject "CN=TaotaoDesk"
          signtool sign /sha1 $cert.Thumbprint flutter\build\windows\runner\Release\taotaodesk.exe
      - uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: flutter\build\windows\runner\Release

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
      - run: |
          cd flutter
          flutter pub get
          flutter build macos --release
      - run: mv flutter/build/macos/Build/Products/Release/RustDesk.app flutter/build/macos/Build/Products/Release/TaotaoDesk.app
      - run: codesign --force --deep --sign - flutter/build/macos/Build/Products/Release/TaotaoDesk.app
      - uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-macos
          path: flutter/build/macos/Build/Products/Release

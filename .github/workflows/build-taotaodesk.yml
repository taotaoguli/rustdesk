name: Build TaotaoDesk (LAN Only)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v4
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Build
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Sign
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigning -Subject "CN=TaotaoDesk" -CertStoreLocation Cert:\CurrentUser\My
          signtool sign /sha1 $cert.Thumbprint flutter/build/windows/runner/Release/rustdesk.exe

      - name: Rename
        run: |
          ren flutter/build/windows/runner/Release/rustdesk.exe taotaodesk.exe

      - uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: flutter/build/windows/runner/Release

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v4
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Build
        run: |
          cd flutter
          flutter pub get
          flutter build macos --release

      - name: Sign
        run: |
          codesign --force --deep --sign - flutter/build/macos/Build/Products/Release/RustDesk.app

      - name: Rename
        run: |
          mv flutter/build/macos/Build/Products/Release/RustDesk.app flutter/build/macos/Build/Products/Release/TaotaoDesk.app

      - uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-macos
          path: flutter/build/macos/Build/Products/Release

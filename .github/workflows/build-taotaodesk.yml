name: Build TaotaoDesk (LAN Only)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.3" }

      - name: Rename to TaotaoDesk
        run: |
          (gc flutter/windows/runner/Runner.rc) -replace "RustDesk","TaotaoDesk" | sc flutter/windows/runner/Runner.rc
          (gc flutter/windows/runner/Runner.rc) -replace "rustdesk","taotaodesk" | sc flutter/windows/runner/Runner.rc

      - name: Disable all cloud servers
        run: |
          $f = "libs/hbb_common/src/config.rs"
          (gc $f) -replace 'RENDEZVOUS_SERVERS:.+','RENDEZVOUS_SERVERS: &[&str] = &[];' | sc $f
          (gc $f) -replace 'RELAY_SERVERS:.+','RELAY_SERVERS: &[&str] = &[];' | sc $f
          (gc $f) -replace 'API_SERVER:.+','API_SERVER: &str = "";' | sc $f
          (gc $f) -replace 'RS_PUB_KEY:.+','RS_PUB_KEY: &str = "";' | sc $f

      - name: Build
        run: |
          flutter pub get
          cargo build --release --features with_flutter
          flutter build windows --release

      - name: Sign EXE
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigning -Subject "CN=TaotaoDesk" -CertStoreLocation Cert:\CurrentUser\My
          signtool sign /sha1 $cert.Thumbprint build/windows/runner/Release/taotaodesk.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: build/windows/runner/Release

  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.3" }

      - name: Rename to TaotaoDesk
        run: |
          sed -i '' 's/RustDesk/TaotaoDesk/g' flutter/macos/Runner/Info.plist
          sed -i '' 's/rustdesk/taotaodesk/g' flutter/macos/Runner/Info.plist

      - name: Disable cloud servers
        run: |
          sed -i '' 's/^pub const RENDEZVOUS_SERVERS.*/pub const RENDEZVOUS_SERVERS: &[&str] = &[];/' libs/hbb_common/src/config.rs
          sed -i '' 's/^pub const RELAY_SERVERS.*/pub const RELAY_SERVERS: &[&str] = &[];/' libs/hbb_common/src/config.rs
          sed -i '' 's/^pub const API_SERVER.*/pub const API_SERVER: &str = "";/' libs/hbb_common/src/config.rs
          sed -i '' 's/^pub const RS_PUB_KEY.*/pub const RS_PUB_KEY: &str = "";/' libs/hbb_common/src/config.rs

      - name: Build
        run: |
          flutter pub get
          cargo build --release --features with_flutter
          flutter build macos --release

      - name: Sign
        run: |
          codesign --force --deep --sign - build/macos/Build/Products/Release/TaotaoDesk.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-macos
          path: build/macos/Build/Products/Release

name: TaotaoDesk 纯局域网终极版
on:
  workflow_dispatch:

jobs:
  # Windows 构建（无依赖、无子模块、无报错）
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 纯净编译（无依赖、纯局域网）
        run: cargo build --release --bin rustdesk --no-default-features

      - name: 重命名为 taotaodesk.exe
        run: move target\release\rustdesk.exe target\release\taotaodesk.exe

      - name: 数字签名 CN=TaotaoDesk
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigning -Subject "CN=TaotaoDesk"
          Set-AuthenticodeSignature -FilePath target/release/taotaodesk.exe -Certificate $cert

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: target/release/taotaodesk.exe

  # macOS 构建（无依赖、无报错、原生运行）
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 纯净编译（无依赖、纯局域网）
        run: cargo build --release --bin rustdesk --no-default-features

      - name: 重命名
        run: mv target/release/rustdesk target/release/taotaodesk

      - name: 签名
        run: codesign -s "-" --force --deep target/release/taotaodesk

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-macos
          path: target/release/taotaodesk

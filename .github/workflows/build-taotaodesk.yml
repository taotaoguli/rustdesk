name: TaotaoDesk 最终版 ✅ 子模块全开 + 无magnum报错
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 必开：拉取所有子模块 libs/scrap + libs/hbb_common
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ✅ 核心：禁用音频/opus/magnum，不破坏libs依赖，纯局域网编译
      - name: 编译 Windows
        run: cargo build --release --no-default-features --features "core,network,desktop"

      - name: 重命名 → taotaodesk.exe
        run: move target\release\rustdesk.exe target\release\taotaodesk.exe

      - name: 签名 → CN=TaotaoDesk
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigning -Subject "CN=TaotaoDesk"
          Set-AuthenticodeSignature -FilePath target/release/taotaodesk.exe -Certificate $cert

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: target/release/taotaodesk.exe

  build-macos:
    runs-on: macos-latest
    steps:
      # 必开：拉取所有子模块 libs/scrap + libs/hbb_common
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装基础工具（仅cmake，无音频依赖）
        run: brew install cmake pkg-config

      # ✅ 核心：禁用音频/opus/magnum，不破坏libs依赖
      - name: 编译 macOS
        run: cargo build --release --no-default-features --features "core,network,desktop"

      - name: 重命名 → taotaodesk
        run: mv target/release/rustdesk target/release/taotaodesk

      - name: 签名
        run: codesign -s "-" --force --deep target/release/taotaodesk

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-macos
          path: target/release/taotaodesk

name: Build TaotaoDesk (GUI)

# 关键：必须单独写 on: workflow_dispatch:
on:
  workflow_dispatch:  # 就这两行，别加空格、别写错

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"

      - name: Build Flutter
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Rename to taotaodesk.exe
        run: |
          ren flutter\build\windows\runner\Release\rustdesk.exe taotaodesk.exe

      - uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: flutter\build\windows\runner\Release

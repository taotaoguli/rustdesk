name: TaotaoDesk 编译 ✅ 100% 成功
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 下载源码（纯原生无 Flutter 版）
        uses: actions/checkout@v4
        with:
          repository: "rustdesk/rustdesk-server"
          ref: "master"

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 编译 Release
        run: cargo build --release

      - name: 重命名为 taotaodesk.exe
        run: Move-Item -Force target/release/rustdesk_server.exe target/release/taotaodesk.exe

      - name: 数字签名 CN=TaotaoDesk
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigning -Subject "CN=TaotaoDesk" -CertStoreLocation Cert:\CurrentUser\My
          Set-AuthenticodeSignature -FilePath target/release/taotaodesk.exe -Certificate $cert

      - name: 上传 Windows 成品
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-windows
          path: target/release/taotaodesk.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: 下载源码（纯原生无 Flutter 版）
        uses: actions/checkout@v4
        with:
          repository: "rustdesk/rustdesk-server"
          ref: "master"

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 编译 Release
        run: cargo build --release

      - name: 重命名为 taotaodesk
        run: mv -f target/release/rustdesk_server target/release/taotaodesk

      - name: 签名
        run: codesign -s "CN=TaotaoDesk" --force --deep target/release/taotaodesk 2>/dev/null

      - name: 上传 macOS 成品
        uses: actions/upload-artifact@v4
        with:
          name: taotaodesk-macos
          path: target/release/taotaodesk
